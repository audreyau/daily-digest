name: Daily Digest

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's digest
        env:
          WEATHER_CITY: Beaverton
          WEATHER_COUNTRY: US
        run: node src/fetch-digest.js

      - name: Build static site
        run: node src/build-site.js

      - name: Commit new digest
        run: |
          git config user.name "audreyau"
          git config user.email "audreyau@users.noreply.github.com"
          git add digests/ site/
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4